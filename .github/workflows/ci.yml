name: CI Pipeline
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: inventario
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v3
      - name: Build and Run
        run: docker-compose up -d --build
      - name: Check API
        run: |
          # Espera inicial para que los contenedores arranquen
          sleep 30
          # Reintentar la comprobación hasta que responda (12 intentos x 5s = 60s)
          for i in {1..12}; do
            if curl --silent --fail http://localhost:3000/health; then
              echo "API disponible"
              exit 0
            fi
            echo "Intento $i: API no disponible todavía, esperando..."
            sleep 5
          done
          echo "La comprobación de la API falló después de varios intentos"
          exit 1
