name: CI Pipeline
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: inventario
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v3
      - name: Build and Run
        run: docker-compose up -d --build
      - name: Check API
        run: |
          sleep 20
          curl http://localhost:3000/health
